overview: "Build looping virtual TV channels that appear natively in Jellyfin's Live TV, with a ready-made Popular channel out of the box."
description: >
  Live Channels lets administrators build looping virtual TV channels from genres and official
  ratings or from a hand-picked list of items. A built-in Popular channel, configurable on its own
  tab, loops your recent, top rated, and most watched movies and shows with no setup at all. Every
  channel's guide is filled out with descriptions, ratings, episode titles, original air dates, and
  landscape artwork. A Sessions tab shows every channel currently encoding with its run time and live
  speed and a button to stop one, and limits cap how many channels run at once and how long any one
  lasts. Each channel, its guide, and its stream are served in-process through Jellyfin's own Live TV,
  so the channels appear automatically with no tuner to add, no URLs to paste, and no exposed endpoints.
category: "Live TV"
