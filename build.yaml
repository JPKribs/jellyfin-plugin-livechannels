overview: "Build looping virtual TV channels that appear in Jellyfin's Live TV."
description: >
  Live Channels lets administrators build looping virtual TV channels from genres and official
  ratings or from a list of items they pick. The channels are served to Jellyfin as a self
  configuring M3U tuner with an XMLTV guide, registered automatically so there are no URLs to
  paste, and reachable only on the loopback address unless external access is enabled.
