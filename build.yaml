overview: "Build looping virtual TV channels that appear natively in Jellyfin's Live TV."
description: >
  Live Channels lets administrators build looping virtual TV channels from genres and official
  ratings or from a hand-picked list of items. Each channel, its guide, and its stream are served
  in-process through Jellyfin's own Live TV, so the channels appear automatically with no tuner to
  add, no URLs to paste, and no exposed endpoints.
