overview: "Build looping virtual TV channels that appear natively in Jellyfin's Live TV, with a ready-made Popular channel out of the box."
description: >
  Live Channels turns your own library into looping virtual TV channels that play natively in
  Jellyfin's Live TV. The channels, their guide, and their streams are all served inside Jellyfin
  itself, so they appear automatically with no tuner to add, no URLs to paste, and no exposed endpoints.
